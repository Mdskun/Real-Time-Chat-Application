version: '3.9'

services:
  frontend:
    container_name: chat_frontend
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend
  backend:
    container_name: chat_backend
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    container_name: chat_db
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    ports:
      - "5432:5432"

volumes:
  postgres_data: