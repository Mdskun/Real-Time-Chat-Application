services:
  frontend:
    container_name: chat_frontend
    build:
      context: ./frontend
      dockerfile: dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "4173:4173"
    env_file:
      - .env
    depends_on:
      - backend

  backend:
    container_name: chat_backend
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    container_name: chat_db
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatdb"]
      interval: 5s
      retries: 5
    env_file:
      - .env
    ports:
      - "5432:5432"

volumes:
  postgres_data: