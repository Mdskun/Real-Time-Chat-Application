apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-config
  namespace: realtime-chat
data:
  DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "*"
  POSTGRES_DB: "chatdb"
  POSTGRES_USER: "chatuser"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  CORS_ALLOWED_ORIGINS: "http://localhost,http://chat.local"
  CSRF_TRUSTED_ORIGINS: "http://localhost,http://chat.local"
  VITE_API_URL: "http://chat.local/api"
  VITE_WS_URL: "ws://chat.local/ws"
