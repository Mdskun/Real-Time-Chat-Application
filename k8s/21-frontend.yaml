apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: realtime-chat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Build from ./frontend and push to your registry, e.g.
          # docker build -t <registry>/realtime-chat-frontend:latest ./frontend \
          #   --build-arg VITE_API_URL=http://chat.local/api --build-arg VITE_WS_URL=ws://chat.local/ws
          image: realtime-chat-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: realtime-chat
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
