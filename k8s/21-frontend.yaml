apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: realtime-chat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Built from ./frontend/Dockerfile (same Dockerfile docker-compose.yml uses),
          # with --build-arg VITE_API_URL / --build-arg VITE_WS_URL (matches the Dockerfile's
          # ARG names exactly) pointing at the public ingress host, then pushed by Jenkins.
          image: docker.io/mdskun/chatapp_frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: realtime-chat
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
