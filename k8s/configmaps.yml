# ConfigMap — non-sensitive config only
# Sensitive values (DJANGO_SECRET_KEY, REGISTRATION_SECRET, DB_PASSWORD, POSTGRES_PASSWORD)
# are in secret.yml (gitignored) and injected via secretRef in deployments
apiVersion: v1
kind: ConfigMap
metadata:
  name: env-back
  namespace: chatapp
data:
  DJANGO_ALLOWED_HOSTS: "chat-backend-svc,chat-backend-svc.chatapp.svc.cluster.local,chat-frontend-svc"
  DB_ENGINE: "django.db.backends.postgresql"
  DB_NAME: "chatdb"
  DB_USER: "chatuser"
  # DB_HOST must match the headless Service name (chat-db) so entrypoint.sh nc check resolves
  DB_HOST: "chat-db"
  DB_PORT: "5432"
  POSTGRES_DB: "chatdb"
  POSTGRES_USER: "chatuser"
  # PGDATA subdirectory prevents postgres "directory not empty" error on PVC root mount
  PGDATA: "/var/lib/postgresql/data/pgdata"
