apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: realtime-chat
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: realtime-chat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Build from ./backend and push to your registry, e.g.
          # docker build -t <registry>/realtime-chat-backend:latest ./backend
          image: realtime-chat-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: chat-config
            - secretRef:
                name: chat-secrets
          volumeMounts:
            - name: media-storage
              mountPath: /app/media
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: realtime-chat
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
