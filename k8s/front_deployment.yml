apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-frontend
  namespace: chatapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatapp
      tier: front
  template:
    metadata:
      labels:
        app: chatapp
        tier: front
    spec:
      containers:
      - name: chat-frontend
        # IMPORTANT: VITE_API_BASE_URL is baked into the JS bundle at docker build time
        # (vite replaces import.meta.env.VITE_* at build, not at runtime).
        # Pass --build-arg VITE_API_BASE_URL=http://chat-backend-svc:8000 in your docker build command.
        # No envFrom needed here — runtime env vars cannot change a Vite build.
        image: mdskun/chatapp2_frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
