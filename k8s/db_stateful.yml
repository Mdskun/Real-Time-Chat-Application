apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chat-db
  namespace: chatapp
spec:
  serviceName: "chat-db"
  replicas: 1
  selector:
    matchLabels:
      app: chatapp
      tier: db
  template:
    metadata:
      labels:
        app: chatapp
        tier: db
    spec:
      containers:
      - name: chat-db
        image: postgres:15
        envFrom:
        - configMapRef:
            name: env-back     # provides POSTGRES_DB, POSTGRES_USER, PGDATA
        - secretRef:
            name: env-secrets  # provides POSTGRES_PASSWORD
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-store
          mountPath: /var/lib/postgresql/data
          # PGDATA env var points postgres to the pgdata/ subdirectory inside this mount,
          # avoiding the "directory not empty" error postgres throws on a bare PVC mount
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "chatuser", "-d", "chatdb"]
          initialDelaySeconds: 10
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: db-store
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
